<style>
*{
    box-sizing: border-box;
    font-family:arial;
}
body{
    margin:0;
    background-color:#1B2430;
}
.typesofwords{
    display:flex;
    max-width:500px;
    width:100%;
    margin:auto;
}
.typesofwords button{
    width:50%;
    padding:10px;
    text-align:center;
    cursor: pointer;
    font-size:14px;
}
.typesofwords .highlight{
    background-color: black;
    color: white;
}

.word{
    color:white;
    width:100%;
    max-width:500px;
    padding:0 20px;
    position:fixed;
    top:40%;
    left:50%;
    transform: translate(-50%,-50%);
    display:block;
    text-align:center;
    font-size:3rem;
    text-decoration: none;
}
.bottomblock{
    display:flex;
    max-width:500px;
    width:100%;
    position:fixed;
    bottom:0;
    left:50%;
    transform: translateX(-50%);
    flex-wrap:wrap;
}
.bottomblock .item{
    width:50%;
    padding:10px;
    text-align:center;
    cursor: pointer;
    margin-bottom:10px;
    font-size:14px;
}
.bottomblock .radio{
    width:calc(100% / 4);
    padding:10px 5px;
}
.bottomblock .source{
    width:calc(85% / 2);
}
.bottomblock .swap{
    width:15%;
    padding:0;
    line-height: 1;
    font-size:26px;
}

.bottomblock label{
    color:white;
}
.bottomblock a{
    text-decoration: none;
    background-color: #efefef;
    border:1px solid #767676;
    color:black;
}
.bottomblock .contact{
    width:100%;
    color:white;
}
.bottomblock .cursorauto{
    cursor:auto;
}
</style>
</head>

let wordTypeButtons = document.querySelectorAll(".typesofwords button");
let prevNextButtons = document.querySelectorAll(".prevnext");
let sources = document.querySelectorAll(".source");

if(!localStorage.getItem("wordnumber")){
    localStorage.setItem("wordnumber","0");
    localStorage.setItem("phrasenumber","0");
    localStorage.setItem("tabname","words");
    localStorage.setItem("autoopen","oxford");
    localStorage.setItem("rightsource",sources[1].textContent);

    document.querySelector(".word").textContent = words[0][0];
    let query = "https://www.google.com/search?q=" + encodeURIComponent("meaning and usage of the word " + '"' + words[0][0] + '"');

    sources[0].href = words[0][1];
    sources[1].href = query;
}
else{
    let wordNumber = getWordNumber();
    let wordsArray;
    let wordType;

    if(localStorage.getItem("tabname") == "words"){
        wordsArray = words;
        wordType = "word";
        wordTypeButtons[0].classList.add("highlight");
        wordTypeButtons[1].classList.remove("highlight");
    }
    else{
        wordsArray = phrases;
        wordType = "phrase";
        wordTypeButtons[0].classList.remove("highlight");
        wordTypeButtons[1].classList.add("highlight");
    }

    document.querySelector(".word").textContent = wordsArray[wordNumber][0];
    let query = "https://www.google.com/search?q=" + encodeURIComponent("meaning and usage of the " + wordType + ' "' + wordsArray[wordNumber][0] + '"');
        
    if(sources[0].textContent == "View in Oxford"){
        sources[0].href = wordsArray[wordNumber][1];
        sources[1].href = query;
    }
    else{
        sources[0].href = query;
        sources[1].href = wordsArray[wordNumber][1];
    }

    if(localStorage.getItem("rightsource") != sources[1].textContent){
        let swapButton = document.querySelector(".swap");

        swapButton.after(sources[0]);
        swapButton.before(sources[1]);
    }

    let autoOpen = localStorage.getItem("autoopen");
    document.querySelector('input[value="' + autoOpen + '"]').checked = true;
}

function changeTab(type){
    if(type == localStorage.getItem("tabname")){
        return;
    }
    else{
        localStorage.setItem("tabname",type);
    }

    let wordNumber = getWordNumber();
    let wordsArray;
    let wordType;

    if(type == "words"){
        wordsArray = words;
        wordType = "word";
        wordTypeButtons[0].classList.add("highlight");
        wordTypeButtons[1].classList.remove("highlight");
    }
    else{
        wordsArray = phrases;
        wordType = "phrase";
        wordTypeButtons[0].classList.remove("highlight");
        wordTypeButtons[1].classList.add("highlight");
    }

    document.querySelector(".word").textContent = wordsArray[wordNumber][0];
    let query = "https://www.google.com/search?q=" + encodeURIComponent("meaning and usage of the "+ wordType + ' "' +wordsArray[wordNumber][0] + '"');

    if(sources[0].textContent == "View in Oxford"){
        sources[0].href = wordsArray[wordNumber][1];
        sources[1].href = query;
    }
    else{
        sources[0].href = query;
        sources[1].href = wordsArray[wordNumber][1];
    }
}

function getWordNumber(){
    if(localStorage.getItem("tabname") == "words"){
        return +localStorage.getItem("wordnumber");
    }
    else{
        return +localStorage.getItem("phrasenumber");
    }
}

function prevNext(button){
    let wordNumber = getWordNumber();
    let storageItemName;
    let wordsArray;
    let wordType;
    let autoOpen = document.querySelector("input:checked").value;

    if(localStorage.getItem("tabname") == "words"){
        storageItemName = "wordnumber";
        wordsArray = words;
        wordType = "word";
    }
    else{
        storageItemName = "phrasenumber";
        wordsArray = phrases;
        wordType = "phrase";
    }

    if(button == "previous"){
        if(wordNumber == 0){
            wordNumber = wordsArray.length - 1;
        }
        else{
            wordNumber = wordNumber - 1;
        }
    }
    else{
        if(wordNumber == wordsArray.length - 1){
            wordNumber = 0;
        }
        else{
            wordNumber = wordNumber + 1;
        }
    }

    document.querySelector(".word").textContent = wordsArray[wordNumber][0];
    localStorage.setItem(storageItemName, wordNumber);
    let query = "https://www.google.com/search?q=" + encodeURIComponent("meaning and usage of the "+ wordType + ' "' + wordsArray[wordNumber][0] + '"');
        
    if(sources[0].textContent == "View in Oxford"){
        sources[0].href = wordsArray[wordNumber][1];
        sources[1].href = query;
    }
    else{
        sources[0].href = query;
        sources[1].href = wordsArray[wordNumber][1];
    }

    if(autoOpen == "oxford"){
        setTimeout(()=>{
            window.open(wordsArray[wordNumber][1],"_blank");
        },500)
    }
    else if(autoOpen == "google"){
        setTimeout(()=>{
            window.open(query, "_blank");
        },500)
    }
}

function swapSources(){
    let swapButton = document.querySelector(".swap");
    let sources = document.querySelectorAll(".source");
    
    localStorage.setItem("rightsource",sources[0].textContent)

    swapButton.after(sources[0]);
    swapButton.before(sources[1]);
}

function changeAutoOpen(){
    let autoOpen = document.querySelector("input:checked").value;
    localStorage.setItem("autoopen",autoOpen)
}
